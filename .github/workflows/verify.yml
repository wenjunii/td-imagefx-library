name: Verify repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Compile Python sources
        run: python -m compileall -q src tools touchdesigner/extensions
      - name: Run unit tests
        run: python -m unittest discover -v
      - name: Run repository verification
        run: python tools/verify_repository.py

  immutable-history:
    name: Preserve published package versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Verify immutable package history for pull request
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python tools/check_immutable_history.py
      - name: Verify immutable package history for push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python tools/check_immutable_history.py --base "${{ github.event.before }}"
